<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Company Fleet Tracker</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- jsPDF & AutoTable -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif;
            background-color: #020617; /* slate-950 */
            color: #f8fafc; /* slate-50 */
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(14, 165, 233, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.08), transparent 25%);
        }
        
        h1, h2, h3, .font-rajdhani { font-family: 'Rajdhani', sans-serif; }

        /* Sleek scrollbar - neon blue */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: rgba(2, 6, 23, 0.5); }
        ::-webkit-scrollbar-thumb { background: #0ea5e9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #38bdf8; }

        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(15px) scale(0.98); filter: blur(4px); } 
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); } 
        }

        .slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.6); /* slate-900 */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(56, 189, 248, 0.1); /* sky-400 */
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4), inset 0 1px 0 0 rgba(255, 255, 255, 0.05);
        }

        .neon-border {
            box-shadow: 0 0 10px rgba(14, 165, 233, 0.3), inset 0 0 10px rgba(14, 165, 233, 0.1);
            border: 1px solid rgba(14, 165, 233, 0.4);
        }
        
        .neon-border-green {
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.3), inset 0 0 10px rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.4);
        }

        .neon-text {
            text-shadow: 0 0 8px rgba(14, 165, 233, 0.6);
        }

        /* Input hiding arrows */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .btn-modern { transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .btn-modern:active { transform: scale(0.95); }

        .success-anim { animation: successScale 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes successScale {
            0% { transform: scale(0.5); opacity: 0; filter: blur(10px); }
            100% { transform: scale(1); opacity: 1; filter: blur(0); }
        }

        /* Isometric / Holographic card effect */
        .holo-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            transform-style: preserve-3d;
        }
        .holo-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px -10px rgba(14, 165, 233, 0.2), inset 0 1px 0 0 rgba(255, 255, 255, 0.1);
            border-color: rgba(14, 165, 233, 0.3);
        }
    </style>
</head>
<body class="antialiased overflow-x-hidden selection:bg-sky-500/30 selection:text-sky-200 min-h-screen flex flex-col relative">
    
    <!-- Ambient glowing orbs behind everything -->
    <div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-sky-900/20 blur-[120px] pointer-events-none -z-10"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-indigo-900/20 blur-[120px] pointer-events-none -z-10"></div>

    <div id="app" class="flex-1 w-full max-w-5xl mx-auto flex flex-col items-center">
        <!-- Persistent View Containers to avoid flashing full innerHTML -->
        <div id="view-loader" class="w-full min-h-screen flex items-center justify-center">
            <i class="fas fa-circle-notch fa-spin text-4xl text-sky-400"></i>
        </div>
        <div id="view-login" class="w-full hidden justify-center items-center min-h-screen"></div>
        <div id="view-vehicles" class="w-full hidden justify-start flex-col"></div>
        <div id="view-active-trip" class="w-full hidden justify-start flex-col"></div>
        <div id="view-admin" class="w-full hidden justify-start flex-col"></div>
    </div>

    <!-- Start Trip Modal -->
    <div id="start-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md flex items-center justify-center p-4 z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="glass-panel border-sky-500/30 rounded-2xl w-full max-w-sm overflow-hidden shadow-[0_0_50px_rgba(14,165,233,0.2)] transform scale-95 transition-transform duration-300 holo-card bg-slate-900" id="start-modal-content">
            <div class="p-5 border-b border-sky-500/20 flex justify-between items-center bg-slate-950/60">
                <h3 class="font-bold text-lg text-white font-rajdhani uppercase tracking-widest neon-text">Link Initialization</h3>
                <button onclick="window.closeModal('start-modal', 'start-modal-content')" class="text-sky-500/50 hover:text-sky-400 transition-colors"><i class="fas fa-times"></i></button>
            </div>
            
            <div id="start-form" class="p-6 bg-slate-900/40 relative">
                <div class="absolute inset-0 bg-gradient-to-br from-emerald-500/5 to-transparent pointer-events-none"></div>
                <p id="start-modal-text" class="text-xs text-sky-200/70 mb-6 font-mono uppercase tracking-[0.2em] relative z-10"></p>
                
                <div class="mb-6 relative z-10">
                    <label class="block text-[10px] font-bold text-sky-400 uppercase tracking-[0.2em] mb-2 font-mono">Directive / Purpose</label>
                    <input type="text" id="purpose-input" placeholder="e.g., SECTOR PATROL" class="w-full p-4 bg-slate-950 border border-sky-500/30 rounded-xl focus:ring-2 focus:ring-sky-500/50 focus:border-sky-400 focus:outline-none text-sky-100 transition-all font-mono text-sm shadow-inner placeholder-sky-900/50">
                </div>
                
                <div class="flex justify-center mt-10 mb-4 relative z-10">
                    <!-- Futuristic 3D Push Button -->
                    <button id="start-btn" onclick="window.confirmStartDriving()" class="relative w-36 h-36 rounded-full bg-slate-900 border border-sky-500/20 shadow-[0_15px_35px_rgba(0,0,0,0.5),inset_0_-5px_15px_rgba(0,0,0,0.4),inset_0_5px_15px_rgba(56,189,248,0.2)] flex flex-col items-center justify-center transition-all duration-200 hover:shadow-[0_20px_40px_rgba(16,185,129,0.2)] active:transform active:scale-95 active:shadow-[0_5px_10px_rgba(0,0,0,0.5)] group outline-none focus:ring-4 focus:ring-emerald-500/30">
                        <div class="absolute inset-4 rounded-full border border-sky-500/30 bg-gradient-to-b from-slate-800 to-slate-900 shadow-[inset_0_-2px_10px_rgba(0,0,0,0.5)] flex flex-col items-center justify-center pointer-events-none group-active:from-slate-900 transition-colors">
                            <i class="fas fa-power-off text-emerald-500 text-3xl mb-1 group-hover:text-emerald-400 group-active:text-emerald-600 transition-colors drop-shadow-[0_0_8px_rgba(16,185,129,0.8)]"></i>
                            <span class="text-xl font-bold font-rajdhani tracking-[0.2em] text-emerald-500 group-hover:text-emerald-400 transition-colors group-active:text-emerald-600 drop-shadow-[0_0_5px_rgba(16,185,129,0.5)]">START</span>
                        </div>
                    </button>
                </div>
            </div>

            <div id="start-success" class="hidden p-8 flex-col items-center justify-center h-[300px] bg-slate-900/40 relative">
                <!-- Abstract holographic car start animation -->
                <div class="relative w-32 h-32 flex items-center justify-center mb-6">
                    <div class="absolute inset-0 border-[3px] border-emerald-500/50 rounded-full animate-[ping_1.5s_cubic-bezier(0,0,0.2,1)_infinite]"></div>
                    <div class="absolute inset-2 border border-emerald-400/30 rounded-full animate-[spin_4s_linear_infinite]"></div>
                    <div class="absolute inset-4 border border-emerald-400/20 rounded-full animate-[spin_3s_linear_infinite_reverse]"></div>
                    <i class="fas fa-space-shuttle text-emerald-400 text-5xl transform -rotate-45 drop-shadow-[0_0_15px_rgba(16,185,129,0.8)] success-anim"></i>
                </div>
                <h3 class="text-xl font-bold text-emerald-400 font-rajdhani tracking-widest uppercase neon-text">Link Established</h3>
                <p class="text-xs font-mono text-emerald-200/50 mt-2 uppercase tracking-[0.2em]">Telemetry Active</p>
            </div>
        </div>
    </div>

    <!-- Stop Trip Modal -->
    <div id="stop-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md flex items-center justify-center p-4 z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="glass-panel border-indigo-500/30 rounded-2xl w-full max-w-sm overflow-hidden shadow-[0_0_50px_rgba(99,102,241,0.2)] transform scale-95 transition-transform duration-300 holo-card bg-slate-900" id="stop-modal-content">
            <div class="p-5 border-b border-indigo-500/20 flex justify-between items-center bg-slate-950/60">
                <h3 class="font-bold text-lg text-white font-rajdhani uppercase tracking-widest neon-text">Secure Unit</h3>
                <button onclick="window.closeModal('stop-modal', 'stop-modal-content')" class="text-indigo-500/50 hover:text-indigo-400 transition-colors"><i class="fas fa-times"></i></button>
            </div>
            <div id="stop-form" class="p-6 bg-slate-900/40 relative">
                <div class="absolute inset-0 bg-gradient-to-br from-rose-500/5 to-transparent pointer-events-none"></div>
                <p class="text-xs text-indigo-200/70 mb-6 font-mono uppercase tracking-[0.2em] relative z-10" id="stop-modal-text">Finalize End Odometer to Disengage.</p>
                
                <div class="mb-6 relative z-10">
                    <label class="block text-[10px] font-bold text-indigo-400 uppercase tracking-[0.2em] mb-2 font-mono">Current Odometer (KM)</label>
                    <input type="number" id="ending-km-input" placeholder="e.g., 45120" class="w-full p-4 bg-slate-950 border border-indigo-500/30 rounded-xl focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-400 focus:outline-none text-indigo-100 transition-all font-mono text-xl tracking-[0.2em] shadow-inner placeholder-indigo-900/50 text-center">
                </div>

                <div class="flex justify-center mt-8 mb-2 relative z-10">
                    <!-- Futuristic 3D Stop Button -->
                    <button id="stop-btn" onclick="window.confirmStopDriving()" class="relative w-36 h-36 rounded-full bg-slate-900 border border-indigo-500/20 shadow-[0_15px_35px_rgba(0,0,0,0.5),inset_0_-5px_15px_rgba(0,0,0,0.4),inset_0_5px_15px_rgba(244,63,94,0.1)] flex flex-col items-center justify-center transition-all duration-200 hover:shadow-[0_20px_40px_rgba(244,63,94,0.2)] active:transform active:scale-95 active:shadow-[0_5px_10px_rgba(0,0,0,0.5)] group outline-none focus:ring-4 focus:ring-rose-500/30">
                        <div class="absolute inset-4 rounded-full border border-indigo-500/30 bg-gradient-to-b from-slate-800 to-slate-900 shadow-[inset_0_-2px_10px_rgba(0,0,0,0.5)] flex flex-col items-center justify-center pointer-events-none group-active:from-slate-900 transition-colors">
                            <i class="fas fa-satellite-dish text-rose-500 text-2xl mb-2 group-hover:text-rose-400 group-active:text-rose-600 transition-colors drop-shadow-[0_0_8px_rgba(244,63,94,0.8)]"></i>
                            <span class="text-xl font-bold font-rajdhani tracking-[0.2em] text-rose-500 group-hover:text-rose-400 transition-colors group-active:text-rose-600 drop-shadow-[0_0_5px_rgba(244,63,94,0.5)]">STOP</span>
                        </div>
                    </button>
                </div>
            </div>
            <div id="stop-success" class="hidden p-8 flex-col items-center justify-center h-[300px] bg-slate-900/40 relative">
                <div class="relative w-32 h-32 flex items-center justify-center mb-6">
                    <div class="absolute inset-0 border-2 border-dashed border-indigo-500/50 rounded-full animate-[spin_6s_linear_infinite]"></div>
                    <div class="absolute inset-4 border border-indigo-400/30 rounded-full"></div>
                    <i class="fas fa-lock text-indigo-400 text-5xl drop-shadow-[0_0_15px_rgba(99,102,241,0.8)] success-anim"></i>
                </div>
                <h3 class="text-xl font-bold text-indigo-400 font-rajdhani tracking-widest uppercase neon-text">Unit Secured</h3>
                <p class="text-xs font-mono text-indigo-200/50 mt-2 uppercase tracking-[0.2em]">Link Terminated</p>
            </div>
        </div>
    </div>

    <!-- Add/Edit Vehicle Modal -->
    <div id="add-vehicle-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md flex items-center justify-center p-4 z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="glass-panel border-sky-500/30 rounded-2xl w-full max-w-sm overflow-hidden shadow-[0_0_50px_rgba(14,165,233,0.2)] transform scale-95 transition-transform duration-300 holo-card bg-slate-900" id="add-vehicle-content">
            <div class="p-5 border-b border-sky-500/20 flex justify-between items-center bg-slate-950/60">
                <h3 id="vehicle-modal-title" class="font-bold text-lg text-white font-rajdhani uppercase tracking-widest neon-text">Unit Editor</h3>
                <button onclick="window.closeModal('add-vehicle-modal', 'add-vehicle-content')" class="text-sky-500/50 hover:text-sky-400 transition-colors"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-6 space-y-5 bg-slate-900/40 relative">
                <div class="absolute inset-0 bg-gradient-to-br from-sky-500/5 to-transparent pointer-events-none"></div>
                <div class="relative z-10">
                    <label class="block text-[10px] font-bold text-sky-400 uppercase tracking-[0.2em] mb-2 font-mono">Make & Model</label>
                    <input type="text" id="new-vehicle-make" placeholder="e.g., TOYOTA CAMRY" class="w-full p-4 bg-slate-950 border border-sky-500/30 rounded-xl focus:ring-2 focus:ring-sky-500/50 focus:border-sky-400 focus:outline-none text-sky-100 transition-all font-mono text-sm shadow-inner placeholder-sky-900/50 uppercase">
                </div>
                <div class="relative z-10">
                    <label class="block text-[10px] font-bold text-sky-400 uppercase tracking-[0.2em] mb-2 font-mono">Callsign / Plate</label>
                    <input type="text" id="new-vehicle-plate" placeholder="e.g., XJ-982" class="w-full p-4 bg-slate-950 border border-sky-500/30 rounded-xl focus:ring-2 focus:ring-sky-500/50 focus:border-sky-400 focus:outline-none text-sky-100 transition-all font-mono text-sm shadow-inner placeholder-sky-900/50 uppercase">
                </div>
                <div class="relative z-10">
                    <label class="block text-[10px] font-bold text-sky-400 uppercase tracking-[0.2em] mb-2 font-mono">Image URL (Optional)</label>
                    <input type="text" id="new-vehicle-photo" placeholder="https://..." class="w-full p-4 bg-slate-950 border border-sky-500/30 rounded-xl focus:ring-2 focus:ring-sky-500/50 focus:border-sky-400 focus:outline-none text-sky-100 transition-all font-mono text-sm shadow-inner placeholder-sky-900/50">
                </div>
                <button onclick="window.submitVehicle()" class="btn-modern w-full bg-slate-900 hover:bg-slate-800 text-sky-400 hover:text-sky-300 py-4 rounded-xl font-bold neon-border transition-all font-rajdhani text-lg tracking-widest uppercase mt-4 relative z-10">Commit Unit</button>
            </div>
        </div>
    </div>

    <!-- Add/Edit Driver Modal -->
    <div id="add-driver-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md flex items-center justify-center p-4 z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="glass-panel border-sky-500/30 rounded-2xl w-full max-w-sm overflow-hidden shadow-[0_0_50px_rgba(14,165,233,0.2)] transform scale-95 transition-transform duration-300 holo-card bg-slate-900" id="add-driver-content">
            <div class="p-5 border-b border-sky-500/20 flex justify-between items-center bg-slate-950/60">
                <h3 id="driver-modal-title" class="font-bold text-lg text-white font-rajdhani uppercase tracking-widest neon-text">Pilot Editor</h3>
                <button onclick="window.closeModal('add-driver-modal', 'add-driver-content')" class="text-sky-500/50 hover:text-sky-400 transition-colors"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-6 space-y-5 bg-slate-900/40 relative">
                <div class="absolute inset-0 bg-gradient-to-br from-indigo-500/5 to-transparent pointer-events-none"></div>
                <div class="relative z-10">
                    <label class="block text-[10px] font-bold text-sky-400 uppercase tracking-[0.2em] mb-2 font-mono">Pilot Designation</label>
                    <input type="text" id="new-driver-name" placeholder="e.g., J. DOE" class="w-full p-4 bg-slate-950 border border-sky-500/30 rounded-xl focus:ring-2 focus:ring-sky-500/50 focus:border-sky-400 focus:outline-none text-sky-100 transition-all font-mono text-sm shadow-inner placeholder-sky-900/50 uppercase">
                </div>
                <div class="relative z-10">
                    <label class="block text-[10px] font-bold text-sky-400 uppercase tracking-[0.2em] mb-2 font-mono">Auth Token (4-PIN)</label>
                    <input type="password" inputmode="numeric" pattern="[0-9]*" maxlength="4" id="new-driver-pin" placeholder="••••" class="w-full p-4 bg-slate-950 border border-sky-500/30 rounded-xl focus:ring-2 focus:ring-sky-500/50 focus:border-sky-400 focus:outline-none text-sky-100 transition-all font-mono tracking-[1em] text-center text-xl font-bold shadow-inner placeholder-sky-900/50">
                    <p class="text-[9px] text-sky-500/50 mt-2 hidden font-mono uppercase tracking-widest" id="edit-pin-hint">Leave blank to retain current auth</p>
                </div>
                <div class="relative z-10">
                    <label class="block text-[10px] font-bold text-sky-400 uppercase tracking-[0.2em] mb-2 font-mono">Image URL (Optional)</label>
                    <input type="text" id="new-driver-photo" placeholder="https://..." class="w-full p-4 bg-slate-950 border border-sky-500/30 rounded-xl focus:ring-2 focus:ring-sky-500/50 focus:border-sky-400 focus:outline-none text-sky-100 transition-all font-mono text-sm shadow-inner placeholder-sky-900/50">
                </div>
                <button onclick="window.submitDriver()" class="btn-modern w-full bg-slate-900 hover:bg-slate-800 text-indigo-400 hover:text-indigo-300 py-4 rounded-xl font-bold border border-indigo-500/30 shadow-[0_0_15px_rgba(99,102,241,0.2)] transition-all font-rajdhani text-lg tracking-widest uppercase mt-4 relative z-10">Commit Pilot</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed top-6 left-1/2 transform -translate-x-1/2 px-6 py-3.5 rounded-full shadow-lg text-sm font-medium transition-all duration-300 opacity-0 -translate-y-4 z-[100] flex items-center justify-center pointer-events-none min-w-[280px]"></div>

    <!-- Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, addDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyCSVE4DJIKMx4OkBi_TJct2E9HB_GYpbhM",
            authDomain: "eic-fleet.firebaseapp.com",
            projectId: "eic-fleet",
            storageBucket: "eic-fleet.firebasestorage.app",
            messagingSenderId: "375768338401",
            appId: "1:375768338401:web:62c355a298ec80ad240ca0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const APP_ID = "eic-fleet";
        const getCol = (name) => collection(db, 'artifacts', APP_ID, 'public', 'data', name);
        const getDocRef = (colName, docId) => doc(db, 'artifacts', APP_ID, 'public', 'data', colName, docId);

        const ADMIN_PIN = '9999';

        let state = {
            view: 'login', // 'login', 'vehicles', 'admin', 'active_trip'
            adminTab: 'logbook',
            currentUser: null,
            drivers: [],
            vehicles: [],
            logs: [],
            selectedVehicle: null,
            editingVehicleId: null,
            editingDriverId: null,
            isLoading: true
        };

        let loaded = { drivers: false, vehicles: false, logs: false };

        async function init() {
            try {
                await signInAnonymously(auth);
                setupRealtimeListeners();
            } catch (error) {
                console.error("Firebase Auth Error:", error);
                state.isLoading = false;
                document.getElementById('app').innerHTML = `
                    <div class="flex items-center justify-center min-h-screen">
                        <div class="glass-panel bg-white p-8 rounded-2xl max-w-sm text-center">
                            <i class="fas fa-exclamation-circle text-4xl text-red-500 mb-4"></i>
                            <h2 class="text-lg font-bold text-slate-800 mb-2">Connection Error</h2>
                            <p class="text-sm text-slate-500">Unable to authenticate to the database. Please try again later.</p>
                        </div>
                    </div>`;
            }
        }

        function formatDate(isoString) {
            if (!isoString) return '-';
            const date = new Date(isoString);
            return date.toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function setupRealtimeListeners() {
            onSnapshot(getCol('drivers'), (snapshot) => {
                state.drivers = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                checkLoaded('drivers');
            });
            onSnapshot(getCol('vehicles'), (snapshot) => {
                state.vehicles = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                // Sort visually: Available first
                state.vehicles.sort((a,b) => a.status === 'Available' ? -1 : 1);
                checkLoaded('vehicles');
                
                // If we are logged in and our vehicle updates (e.g., someone forces takeover), re-evaluate
                if (state.currentUser && state.view === 'active_trip') {
                    const myActive = state.vehicles.find(v => v.status === 'In Use' && v.currentDriverId === state.currentUser.id);
                    if (!myActive) handleAutoBypass(); // We lost the vehicle
                }
            });
            onSnapshot(getCol('logs'), (snapshot) => {
                let fetchedLogs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                // Sort by newest start time
                fetchedLogs.sort((a, b) => new Date(b.startTime) - new Date(a.startTime));
                state.logs = fetchedLogs;
                checkLoaded('logs');
            });
        }

        function checkLoaded(type) {
            loaded[type] = true;
            if (loaded.drivers && loaded.vehicles && loaded.logs) {
                state.isLoading = false;
                if(state.currentUser) handleAutoBypass();
                else render();
            }
        }

        function handleAutoBypass() {
            if (!state.currentUser || state.view === 'admin') return render();
            
            const myActive = state.vehicles.find(v => v.status === 'In Use' && v.currentDriverId === state.currentUser.id);
            if (myActive) {
                state.view = 'active_trip';
                state.selectedVehicle = myActive;
            } else {
                state.view = 'vehicles';
                state.selectedVehicle = null;
            }
            render();
        }

        function updateDOM(id, html) {
            const el = document.getElementById(id);
            if(el && el.innerHTML !== html) {
                el.innerHTML = html;
            }
        }

        function showView(viewId) {
            ['view-loader', 'view-login', 'view-vehicles', 'view-active-trip', 'view-admin'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(viewId).classList.remove('hidden');
            // Login view already has items-center justify-center in HTML
        }

        function render() {
            if (state.isLoading) {
                showView('view-loader');
                return;
            }

            if (state.view === 'login') {
                updateDOM('view-login', renderLogin());
                showView('view-login');
            } else if (state.view === 'vehicles') {
                updateDOM('view-vehicles', renderVehicles());
                showView('view-vehicles');
            } else if (state.view === 'active_trip') {
                updateDOM('view-active-trip', renderActiveTrip());
                showView('view-active-trip');
            } else if (state.view === 'admin') {

                        <div>
                            <p class="text-[10px] text-sky-500 uppercase font-mono font-bold tracking-[0.2em]">Oversight Status: Active</p>
                            <h1 class="font-bold text-white text-xl tracking-widest uppercase leading-tight font-rajdhani neon-text">Command Center</h1>
                        </div>
                    </div>
                    <button onclick="window.logout()" class="w-12 h-12 rounded-full bg-slate-900 border border-sky-500/30 hover:border-sky-400/50 text-sky-500 hover:text-sky-300 transition-colors shadow-[0_0_10px_rgba(14,165,233,0.2)] flex items-center justify-center btn-modern group">
                        <i class="fas fa-power-off group-hover:drop-shadow-[0_0_5px_rgba(14,165,233,0.8)]"></i>
                    </button>
                </header>
                
                <div class="flex border-b border-sky-500/20 sticky top-[89px] z-30 bg-slate-950/80 backdrop-blur-xl px-4 overflow-x-auto no-scrollbar mb-8 shadow-sm">
                    ${tabs}
                </div>
                
                <div class="px-6 flex-1">
                    ${contentHtml}
                </div>
            </div>`;
        }

        // --- Action Handlers ---
        window.handleLoginSubmit = () => {
            const input = document.getElementById('login-pin');
            const pin = input.value.trim();
            
            if (pin.length !== 4) {
                window.showToast("Please enter a 4-digit PIN", true);
                return;
            }

            if (pin === ADMIN_PIN) {
                state.view = 'admin';
                input.value = '';
                render();
            } else {
                const driver = state.drivers.find(d => String(d.pin) === pin);
                if (driver) {
                    state.currentUser = driver;
                    input.value = '';
                    handleAutoBypass();
                } else {
                    window.showToast("Invalid PIN", true);
                    input.value = '';
                    input.focus();
                }
            }
        };

        // Listen for Enter key on login
        document.addEventListener('keydown', (e) => {
            if(state.view === 'login' && e.key === 'Enter') {
                window.handleLoginSubmit();
            }
        });


        // Modals & Toast
        window.openModal = (modalId, contentId) => {
            const m = document.getElementById(modalId);
            const c = document.getElementById(contentId);
            if(!m || !c) return;
            m.classList.remove('hidden');
            setTimeout(() => {
                m.classList.remove('opacity-0');
                c.classList.remove('scale-95');
            }, 10);
        };

        window.closeModal = (modalId, contentId) => {
            const m = document.getElementById(modalId);
            const c = document.getElementById(contentId);
            if(!m || !c) return;
            m.classList.add('opacity-0');
            c.classList.add('scale-95');
            setTimeout(() => m.classList.add('hidden'), 300);
        };

        window.showToast = (msg, isError = false) => {
            const t = document.getElementById('toast');
            if(!t) return;
            t.textContent = msg;
            t.className = `fixed top-6 left-1/2 transform -translate-x-1/2 px-6 py-3.5 rounded-full shadow-lg text-sm font-medium transition-all duration-300 z-[100] flex items-center justify-center pointer-events-none min-w-[280px] ${isError ? 'bg-red-500 text-white' : 'bg-slate-800 text-white'}`;
            setTimeout(() => t.classList.remove('-translate-y-4', 'opacity-0'), 10);
            setTimeout(() => {
                t.classList.add('-translate-y-4', 'opacity-0');
            }, 3000);
        };

        // --- Trip Actions ---
        window.openStartModal = (vid) => {
            state.selectedVehicle = state.vehicles.find(v => v.id === vid);
            if(!state.selectedVehicle) return;
            window.openModal('start-modal', 'start-modal-content');
        };

        window.confirmStartDriving = async () => {
            const v = state.selectedVehicle;
            const purpose = document.getElementById('purpose-input').value.trim();
            if(!v) return;
            if(!purpose) { window.showToast('Please enter a purpose', true); return; }

            try {
                // Quick optimistic UI update
                document.getElementById('start-form').classList.add('hidden');
                document.getElementById('start-success').classList.remove('hidden');
                document.getElementById('start-success').classList.add('flex');
                
                await updateDoc(getDocRef('vehicles', v.id), {
                    status: 'In Use',
                    currentDriverId: state.currentUser.id
                });
                
                await addDoc(getCol('logs'), {
                    vehicleId: v.id,
                    driverId: state.currentUser.id,
                    startTime: new Date().toISOString(),
                    endTime: null,
                    status: 'Active',
                    purpose: purpose,
                    endingKm: null
                });
                
                setTimeout(() => {
                    window.closeModal('start-modal', 'start-modal-content');
                    setTimeout(() => {
                        document.getElementById('start-form').classList.remove('hidden');
                        document.getElementById('start-success').classList.add('hidden');
                        document.getElementById('start-success').classList.remove('flex');
                        document.getElementById('purpose-input').value = '';
                    }, 300);
                }, 1500);

            } catch(e) {
                console.error(e);
                window.showToast('Error starting trip', true);
            }
        };

        window.openStopModal = (vid) => {
            window.openModal('stop-modal', 'stop-modal-content');
        };

        window.confirmStopDriving = async () => {
            const v = state.selectedVehicle;
            const km = document.getElementById('ending-km-input').value.trim();
            if(!v) return;
            if(!km) { window.showToast('Please enter Ending KM', true); return; }

            try {
                document.getElementById('stop-form').classList.add('hidden');
                document.getElementById('stop-success').classList.remove('hidden');
                document.getElementById('stop-success').classList.add('flex');

                await updateDoc(getDocRef('vehicles', v.id), {
                    status: 'Available',
                    currentDriverId: null
                });
                
                const activeLog = state.logs.find(l => l.vehicleId === v.id && l.status === 'Active');
                if(activeLog) {
                    await updateDoc(getDocRef('logs', activeLog.id), {
                        status: 'Closed',
                        endTime: new Date().toISOString(),
                        endingKm: km
                    });
                }

                setTimeout(() => {
                    window.closeModal('stop-modal', 'stop-modal-content');
                    setTimeout(() => {
                        document.getElementById('stop-form').classList.remove('hidden');
                        document.getElementById('stop-success').classList.add('hidden');
                        document.getElementById('stop-success').classList.remove('flex');
                        document.getElementById('ending-km-input').value = '';
                        state.selectedVehicle = null;
                        handleAutoBypass();
                    }, 300);
                }, 1500);

            } catch(e) {
                console.error(e);
                window.showToast('Error securing vehicle', true);
            }
        };

        window.logout = () => {
            state.currentUser = null;
            state.selectedVehicle = null;
            state.view = 'login';
            render();
        };

        window.setAdminTab = (tab) => {
            state.adminTab = tab;
            render();
        };

        // --- Admin CRUD Actions ---
        window.openAddVehicle = () => {
            state.editingVehicleId = null;
            document.getElementById('vehicle-modal-title').textContent = 'Add Vehicle';
            document.getElementById('new-vehicle-make').value = '';
            document.getElementById('new-vehicle-plate').value = '';
            document.getElementById('new-vehicle-photo').value = '';
            window.openModal('add-vehicle-modal', 'add-vehicle-content');
        };

        window.editVehicle = (id) => {
            const v = state.vehicles.find(v => v.id === id);
            if(!v) return;
            state.editingVehicleId = id;
            document.getElementById('vehicle-modal-title').textContent = 'Edit Vehicle';
            document.getElementById('new-vehicle-make').value = v.makeModel || '';
            document.getElementById('new-vehicle-plate').value = v.plate || '';
            document.getElementById('new-vehicle-photo').value = v.photo || '';
            window.openModal('add-vehicle-modal', 'add-vehicle-content');
        };

        window.submitVehicle = async () => {
            const make = document.getElementById('new-vehicle-make').value.trim();
            const plate = document.getElementById('new-vehicle-plate').value.trim();
            const photo = document.getElementById('new-vehicle-photo').value.trim();
            if(!make || !plate) { window.showToast('Make/Model and Plate are required', true); return; }

            try {
                if (state.editingVehicleId) {
                    await updateDoc(getDocRef('vehicles', state.editingVehicleId), {
                        makeModel: make, plate: plate, photo: photo
                    });
                    window.showToast('Vehicle updated successfully');
                } else {
                    await addDoc(getCol('vehicles'), {
                        makeModel: make, plate: plate, photo: photo,
                        status: 'Available', currentDriverId: null
                    });
                    window.showToast('Vehicle added successfully');
                }
                window.closeModal('add-vehicle-modal', 'add-vehicle-content');
            } catch(e) {
                console.error(e);
                window.showToast('Error saving vehicle', true);
            }
        };

        window.deleteVehicle = async (id) => {
            if(!confirm('Are you sure you want to delete this vehicle?')) return;
            try {
                await deleteDoc(getDocRef('vehicles', id));
                window.showToast('Vehicle deleted');
            } catch(e) {
                console.error(e);
                window.showToast('Error deleting vehicle', true);
            }
        };

        window.openAddDriver = () => {
            state.editingDriverId = null;
            document.getElementById('driver-modal-title').textContent = 'Add Driver';
            document.getElementById('edit-pin-hint').classList.add('hidden');
            document.getElementById('new-driver-name').value = '';
            document.getElementById('new-driver-pin').value = '';
            document.getElementById('new-driver-photo').value = '';
            window.openModal('add-driver-modal', 'add-driver-content');
        };

        window.editDriver = (id) => {
            const d = state.drivers.find(d => d.id === id);
            if(!d) return;
            state.editingDriverId = id;
            document.getElementById('driver-modal-title').textContent = 'Edit Driver';
            document.getElementById('edit-pin-hint').classList.remove('hidden');
            document.getElementById('new-driver-name').value = d.name || '';
            document.getElementById('new-driver-pin').value = ''; // Don't show existing PIN
            document.getElementById('new-driver-photo').value = d.photo || '';
            window.openModal('add-driver-modal', 'add-driver-content');
        };

        window.submitDriver = async () => {
            const name = document.getElementById('new-driver-name').value.trim();
            const pin = document.getElementById('new-driver-pin').value.trim();
            const photo = document.getElementById('new-driver-photo').value.trim();
            
            if(!name) { window.showToast('Name is required', true); return; }
            if(!state.editingDriverId && pin.length !== 4) { window.showToast('4-digit PIN is required', true); return; }
            if(state.editingDriverId && pin.length > 0 && pin.length !== 4) { window.showToast('PIN must be 4 digits', true); return; }

            try {
                if (state.editingDriverId) {
                    const updates = { name: name, photo: photo };
                    if (pin.length === 4) updates.pin = pin;
                    await updateDoc(getDocRef('drivers', state.editingDriverId), updates);
                    window.showToast('Driver updated successfully');
                } else {
                    await addDoc(getCol('drivers'), {
                        name: name, pin: pin, photo: photo
                    });
                    window.showToast('Driver added successfully');
                }
                window.closeModal('add-driver-modal', 'add-driver-content');
            } catch(e) {
                console.error(e);
                window.showToast('Error saving driver', true);
            }
        };

        window.deleteDriver = async (id) => {
            if(!confirm('Are you sure you want to delete this driver?')) return;
            try {
                await deleteDoc(getDocRef('drivers', id));
                window.showToast('Driver deleted');
            } catch(e) {
                console.error(e);
                window.showToast('Error deleting driver', true);
            }
        };

        // Export (TBD with proper library or existing methods if wanted)
        window.exportCSV = () => {
            const headers = ['Status', 'Vehicle', 'Driver', 'Purpose', 'Ending KM', 'Taken Date', 'Return Date'];
            const rows = state.logs.map(log => {
                const v = state.vehicles.find(v => v.id === log.vehicleId);
                const d = state.drivers.find(d => d.id === log.driverId);
                return [
                    log.status,
                    v ? v.makeModel : 'Unknown',
                    d ? d.name : 'Unknown',
                    log.purpose ? log.purpose.replace(/,/g, '') : '', // sanitize commas
                    log.endingKm || '',
                    new Date(log.startTime).toLocaleString(),
                    log.endTime ? new Date(log.endTime).toLocaleString() : ''
                ].join(',');
            });
            const csvData = [headers.join(','), ...rows].join('\n');
            const blob = new Blob([csvData], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('hidden', '');
            a.setAttribute('href', url);
            a.setAttribute('download', 'fleet_logs.csv');
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };

        window.exportPDF = () => {
            if (typeof window.jspdf === 'undefined') return window.showToast('PDF library not loaded', true);
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFontSize(18);
            doc.text('Company Fleet Tracker - Logbook', 14, 22);
            doc.setFontSize(11);
            doc.setTextColor(100);
            doc.text('Generated: ' + new Date().toLocaleString(), 14, 30);
            
            const rows = state.logs.map(log => {
                const v = state.vehicles.find(v => v.id === log.vehicleId);
                const d = state.drivers.find(d => d.id === log.driverId);
                return [
                    log.status,
                    v ? v.makeModel : 'Unknown',
                    d ? d.name : 'Unknown',
                    log.endingKm ? log.endingKm + ' km' : '-',
                    new Date(log.startTime).toLocaleDateString(),
                    log.endTime ? new Date(log.endTime).toLocaleDateString() : '-'
                ];
            });

            doc.autoTable({
                startY: 40,
                head: [['Status', 'Vehicle', 'Driver', 'End KM', 'Taken Date', 'Return Date']],
                body: rows,
                theme: 'grid',
                headStyles: { fillColor: [59, 130, 246] },
                styles: { fontSize: 9 }
            });
            
            doc.save('fleet_logs.pdf');
        };

        init();
    </script>
</body>
</html>
